<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Ready</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="menu-btn" onclick="goToStart()">Menu</button>

    <div class="container">
        <div id="start-ui" class="screen">
            <h1>Disaster Ready</h1>
            <p>Are you prepared to survive?</p>
            <button class="main-btn" onclick="startGame()">START</button>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="stats-bar">
                <span>Health: <span id="health-display">100</span>%</span>
                <span>Score: <span id="score-display">0</span></span>
            </div>
            <h2 id="scenario-text">Scenario goes here...</h2>
            <div id="options-container"></div>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1 class="dead-title">GAME OVER</h1>
            <div class="animation-icon">💀</div>
            <p>You didn't survive the disaster.</p>
            <button class="main-btn" onclick="goToStart()">TRY AGAIN</button>
        </div>

        <div id="finish-screen" class="screen hidden">
            <h1>FINISHED!</h1>
            <div class="trophy-animation">🏆</div>
            <div class="stats-box">
                <p>Final Score: <span id="final-score">0</span></p>
                <p>End Health: <span id="final-health">0%</span></p>
                <p>Risk Level: <span id="final-risk" class="risk-badge">Low</span></p>
            </div>
            <button class="main-btn" onclick="goToStart()">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Offline Mode Ready"));
        }
    </script>
</body>
</html>
